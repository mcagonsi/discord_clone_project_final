<!-- index.xhtml -->
<ui:composition
  template="templates/layout.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="jakarta.faces.core"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
>
  <h:head>
    <title>Welcome to Discord - Team Juggernaut</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </h:head>
  <ui:define name="content">
    <f:event type="preRenderView" listener="#{authBean.checkLoginStatus}" />
    <h:form styleClass="flex gap-4 mb-8">
      <h:commandButton
        value="Login"
        action="#{authBean.showLogin}"
        styleClass="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95 shadow-lg"
      />

      <h:commandButton
        value="Signup"
        action="#{authBean.showSignup}"
        styleClass="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95 shadow-lg"
      />
    </h:form>

  
    <h:panelGroup rendered="#{authBean.authType == 'login'}">
      <ui:include src="templates/components/login.xhtml" />
    </h:panelGroup>

    <h:panelGroup rendered="#{authBean.authType == 'signup'}">
      <ui:include src="templates/components/signup.xhtml" />
    </h:panelGroup>
  </ui:define>
</ui:composition>
