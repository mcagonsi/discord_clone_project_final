<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Login - Discord Clone</title>
        <!-- Tailwind CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
    </h:head>
    <h:body>
        <div class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-black flex items-center justify-center px-4 py-8">
            <div class="w-full max-w-md">
                <!-- Logo/Header -->
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold text-white mb-2">Discord</h1>
                    <p class="text-gray-300 text-sm">Welcome back to Team Juggernaut</p>
                </div>

                <!-- Login Card -->
                <div class="bg-gray-800 rounded-lg shadow-2xl p-8 border border-gray-700">
                    <h2 class="text-2xl font-bold text-white mb-6">Login</h2>

                    <h:form styleClass="space-y-4">
                        <!-- Username/Email Field -->
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-200 mb-2">
                                Username or Email
                            </label>
                            <h:inputText 
                                id="username"
                                value="#{authBean.user.username}"
                                placeholder="Enter your username or email"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                />
                        </div>

                        <!-- Password Field -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-200 mb-2">
                                Password
                            </label>
                            <h:inputSecret 
                                id="password"
                                value="#{authBean.user.password}"
                                placeholder="Enter your password"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                />
                        </div>

                        <!-- Error Messages -->
                        <h:messages 
                            styleClass="text-red-400 text-sm bg-red-900 bg-opacity-20 border border-red-700 rounded p-3"
                            warnStyleClass="text-yellow-400 text-sm bg-yellow-900 bg-opacity-20 border border-yellow-700 rounded p-3"
                            />

                        <!-- Login Button -->
                        <h:commandButton 
                            value="Login"
                            action="#{authBean.login}"
                            styleClass="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 mt-6"
                            />

                        <!-- Divider -->
                        <div class="relative my-6">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-600"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-gray-800 text-gray-400">or</span>
                            </div>
                        </div>

                        <!-- Register Link -->
                        <div class="text-center">
                            <p class="text-gray-400 text-sm">
                                Don't have an account?
                                <h:link value="Sign up" outcome="signup" styleClass="text-indigo-400 hover:text-indigo-300 font-medium" />
                            </p>
                        </div>
                    </h:form>

                    <!-- Forgot Password Link -->
                    <div class="mt-6 text-center">
                        <a href="#" class="text-gray-400 hover:text-gray-300 text-sm">Forgot your password?</a>
                    </div>
                </div>

                <!-- Footer Info -->
                <div class="mt-6 text-center text-gray-400 text-xs">
                    <p>© 2026 Discord Clone - Team Juggernaut. All rights reserved.</p>
                </div>
            </div>
        </div>
    </h:body>
</html>
