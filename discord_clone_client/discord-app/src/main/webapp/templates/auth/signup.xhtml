<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Discord by Juggernaut</title>
        <!-- Tailwind CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
    </h:head>    <h:body>
        <div class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-black flex items-center justify-center px-4 py-8">
            <div class="w-full max-w-md">
                <!-- Logo/Header -->
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold text-white mb-2">Discord</h1>
                    <p class="text-gray-300 text-sm">Join Team Juggernaut</p>
                </div>

                <!-- Signup Card -->
                <div class="bg-gray-800 rounded-lg shadow-2xl p-8 border border-gray-700">
                    <h2 class="text-2xl font-bold text-white mb-6">Create Account</h2>

                    <h:form styleClass="space-y-4">
                        <!-- Display Name Field -->
                        <div>
                            <label for="displayName" class="block text-sm font-medium text-gray-200 mb-2">
                                Display Name
                            </label>
                            <h:inputText 
                                id="displayName"
                                value="#{authBean.user.display_name}"
                                placeholder="Enter your display name"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                required="true"
                                />
                        </div>

                        <!-- Username Field -->
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-200 mb-2">
                                Username
                            </label>
                            <h:inputText 
                                id="username"
                                value="#{authBean.user.username}"
                                placeholder="Enter your username"
                                required="true"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                />
                        </div>

                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-200 mb-2">
                                Email
                            </label>
                            <h:inputText 
                                id="email"
                                value="#{authBean.user.email}"
                                placeholder="Enter your email"
                                required="true"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                />
                        </div>

                        <!-- Password Field -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-200 mb-2">
                                Password
                            </label>
                            <h:inputSecret 
                                id="password"
                                value="#{authBean.user.password}"
                                placeholder="Enter your password"
                                redisplay="false"
                                aria-required="true"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                />
                        </div>

                        <!-- Confirm Password Field -->
                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-200 mb-2">
                                Confirm Password
                            </label>
                            <h:inputSecret 
                                id="confirmPassword"
                                placeholder="Confirm your password"
                                redisplay="false"
                                required ="true"
                                styleClass="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
                                />
                        </div>

                        <!-- Error Messages -->
                        <h:outputText value="#{authBean.message}" rendered="#{authBean.message != null}" styleClass="text-red-400 text-sm bg-red-900 bg-opacity-20 border border-red-700 rounded p-3 block" />

                        <!-- Signup Button -->
                        <h:commandButton 
                            value="Sign Up"
                            action="#{authBean.registerUser}"
                            styleClass="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 mt-6"
                            />

                        <!-- Divider -->
                        <div class="relative my-6">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-600"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-gray-800 text-gray-400">or</span>
                            </div>
                        </div>

                        <!-- Login Link -->
                        <div class="text-center">
                            <p class="text-gray-400 text-sm">
                                Already have an account?
                                <h:link value="Log in" outcome="login" styleClass="text-indigo-400 hover:text-indigo-300 font-medium" />
                            </p>
                        </div>
                    </h:form>
                </div>

                <!-- Footer Info -->
                <div class="mt-6 text-center text-gray-400 text-xs">
                    <p>© 2026 Discord Clone - Team Juggernaut. All rights reserved.</p>
                </div>
            </div>
        </div>
    </h:body>
</html>
